<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | نانج العالمية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ink: #1D1130;
            --purple-deep: #4B2E83;
            --gold: #C9A227;
            --paper: #F6F3EE;
            --text-dark: #241536;
            --white: #FFFFFF;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--paper);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: right;
        }
        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
        }
        .card {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 18px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: var(--purple-deep);
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .field {
            margin-bottom: 1rem;
        }
        .field label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .field input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1.5px solid #E1DCEE;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--gold);
            color: var(--ink);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #E7C766;
        }
        .message {
            text-align: center;
            margin-top: 1rem;
            font-weight: 500;
            padding: 10px;
            border-radius: 8px;
        }
        .message.success {
            background-color: #d4edda;
            color: #155724;
        }
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
        }
        #admin-panel {
            display: none;
        }
        #logout-btn {
            background: none;
            border: none;
            color: var(--purple-deep);
            text-decoration: underline;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: block;
            margin-right: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-panel">
        <div class="card">
            <h1>تسجيل الدخول</h1>
            <p style="text-align: center; margin-bottom: 1.5rem; color: #6b6280;">
                ملاحظة: يجب إنشاء حساب مستخدم في لوحة تحكم Supabase > قسم Authentication.
            </p>
            <form id="login-form">
                <div class="field">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" required>
                </div>
                <div class="field">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn">دخول</button>
            </form>
            <div id="login-message" class="message" style="display: none;"></div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="card">
            <h1>تحديث بيانات التواصل</h1>
            <form id="contact-form">
                <div class="field">
                    <label for="phone">الهاتف</label>
                    <input type="text" id="phone">
                </div>
                <div class="field">
                    <label for="whatsapp">واتساب (بدون +)</label>
                    <input type="text" id="whatsapp">
                </div>
                <div class="field">
                    <label for="contact-email">البريد الإلكتروني</label>
                    <input type="email" id="contact-email">
                </div>
                <div class="field">
                    <label for="address">العنوان</label>
                    <input type="text" id="address">
                </div>
                <button type="submit" class="btn">حفظ التغييرات</button>
            </form>
            <div id="admin-message" class="message" style="display: none;"></div>
            <button id="logout-btn">تسجيل الخروج</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://xyzabc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5emFiYyIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzIwNzYxNjAwLCJleHAiOjI0ODc1MTY4MDB9.some-random-string';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginPanel = document.getElementById('login-panel');
    const adminPanel = document.getElementById('admin-panel');
    const loginForm = document.getElementById('login-form');
    const contactForm = document.getElementById('contact-form');
    const logoutBtn = document.getElementById('logout-btn');
    const loginMsg = document.getElementById('login-message');
    const adminMsg = document.getElementById('admin-message');

    // ==================
    // Authentication
    // ==================

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        showMessage(loginMsg, 'جاري تسجيل الدخول...', 'loading');

        const { data, error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
            showMessage(loginMsg, `فشل تسجيل الدخول: ${error.message}`, 'error');
        } else if (data.user) {
            showMessage(loginMsg, 'تم تسجيل الدخول بنجاح!', 'success');
            setTimeout(checkSession, 1000);
        }
    });

    logoutBtn.addEventListener('click', async () => {
        await sb.auth.signOut();
        checkSession();
    });

    // ==================
    // Admin Logic
    // ==================

    async function loadContactData() {
        showMessage(adminMsg, 'جاري تحميل البيانات...', 'loading');
        try {
            const { data, error } = await sb
                .from('settings')
                .select('phone, whatsapp, email, address')
                .eq('id', 1)
                .single();

            if (error) throw error;

            if (data) {
                document.getElementById('phone').value = data.phone || '';
                document.getElementById('whatsapp').value = data.whatsapp || '';
                document.getElementById('contact-email').value = data.email || '';
                document.getElementById('address').value = data.address || '';
                hideMessage(adminMsg);
            } else {
                 showMessage(adminMsg, 'لم يتم العثور على بيانات، تأكد من وجود صف بالمعرف 1 في جدول settings.', 'error');
            }
        } catch (error) {
            showMessage(adminMsg, `خطأ في تحميل البيانات: ${error.message}`, 'error');
        }
    }

    contactForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        showMessage(adminMsg, 'جاري حفظ التغييرات...', 'loading');

        const updates = {
            phone: document.getElementById('phone').value,
            whatsapp: document.getElementById('whatsapp').value,
            email: document.getElementById('contact-email').value,
            address: document.getElementById('address').value,
        };

        try {
            const { error } = await sb
                .from('settings')
                .update(updates)
                .eq('id', 1);

            if (error) throw error;
            
            showMessage(adminMsg, 'تم حفظ التغييرات بنجاح!', 'success');

        } catch (error) {
            showMessage(adminMsg, `خطأ في حفظ البيانات: ${error.message}. تأكد من صلاحيات الكتابة (RLS).`, 'error');
        }
    });

    // ==================
    // UI & Session
    // ==================

    async function checkSession() {
        const { data } = await sb.auth.getSession();
        const session = data.session;
        if (session) {
            loginPanel.style.display = 'none';
            adminPanel.style.display = 'block';
            await loadContactData();
        } else {
            loginPanel.style.display = 'block';
            adminPanel.style.display = 'none';
        }
    }

    function showMessage(el, text, type) {
        el.textContent = text;
        el.className = `message ${type}`;
        el.style.display = 'block';
        if (type !== 'loading') {
          setTimeout(() => hideMessage(el), 5000);
        }
    }
    
    function hideMessage(el) {
        el.style.display = 'none';
    }

    // Initial check when the page loads
    checkSession();
</script>
</body>
</html>
